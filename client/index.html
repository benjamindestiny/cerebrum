<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A1A" />
    <meta name="description" content="Cerebrum - Interactive Quiz Platform" />
    <title>Cerebrum - Quiz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Ezoic Integration -->
    <script>
      // Ezoic service worker registration
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(function (registration) {
            console.log(
              "Service Worker registered successfully:",
              registration,
            );
          })
          .catch(function (error) {
            console.log("Service Worker registration failed:", error);
          });
      }
    </script>

    <!-- Ezoic Ad Script -->
    <script src="//www.ezojs.com/ezoic/ezoads.js" async></script>

    <!-- Ezoic Verification -->
    <script>
      (function () {
        // Ezoic publisher setup
        window.ezoic = window.ezoic || {};
        window.ezoic.publisher_id = "YOUR_PUBLISHER_ID"; // Replace with your actual publisher ID

        // Load Ezoic script
        var ezoicScript = document.createElement("script");
        ezoicScript.src = "https://5gvci.com/act/files/ezoic.js";
        ezoicScript.async = true;
        document.head.appendChild(ezoicScript);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
